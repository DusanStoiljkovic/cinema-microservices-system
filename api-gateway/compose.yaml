services:
  api-gateway:
    build: ./api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      - movie-service
      - booking-service

  user-service:
    build: .//user-service
    ports:
      - "8081:8081"

  movie-service:
    build: ./movie-service
    ports:
      - "8082:8082"

  booking-service:
    build: ./booking-service
    ports:
      - "8083:8083"