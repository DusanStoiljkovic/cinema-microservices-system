services:
  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: always
    env_file:
      - ./user-service.env
    ports:
      - "3307:3306"
    volumes:
      - user_db_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  user-service:
    build: .
    container_name: user-service
    ports:
      - "8081:8081"
    depends_on:
      - user-db
    env_file:
      - ./user-service.env

volumes:
  user_db_data: