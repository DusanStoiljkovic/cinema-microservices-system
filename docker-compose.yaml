services:
  # API GATEWAY
  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    depends_on:
      - user-service
      # - movie-service
      # - booking-service
    env_file:
      - ./api-gateway/api-gateway.env
    networks:
      - cinema-network

  # USER SERVICE + DB
  user-db:
    image: mysql:8.0
    container_name: user-db
    restart: always
    env_file:
      - ./user-service/user-service.env
    volumes:
      - user-db-data:/var/lib/mysql
    networks:
      - cinema-network

  user-service:
    build: ./user-service
    container_name: user-service
    depends_on:
      - user-db
    env_file:
      - ./user-service/user-service.env
    networks:
      - cinema-network

