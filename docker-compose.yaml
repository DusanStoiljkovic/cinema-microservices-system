  # REDIS
  redis:
    image: redis:latest
    container_name: redis
    networks:
      - cinema-network

  # NATS
  nats:
    image: nats:latest
    container_name: nats
    ports:
      - "4222:4222"
    networks:
      - cinema-network

# NETWORK
networks:
  cinema-network:

