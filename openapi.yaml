  version: 1.0.0
servers:
- url: http://localhost:8080
  description: Local API Gateway
tags:
- name: User Service
  description: User registration, login, authentication, and profile endpoints
- name: Movie Service - Movies
  description: Movie CRUD and movie queries
- name: Movie Service - Genres
  description: Genre management
- name: Movie Service - Movie-Genre Relations
  description: Relations between movies and genres
- name: Booking Service - Halls
  description: Cinema hall management
- name: Booking Service - Projections
  description: Projection management
- name: Booking Service - Tickets
