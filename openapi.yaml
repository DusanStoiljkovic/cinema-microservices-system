components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    RegisterRequest:
      type: object
      required:
      - Name
      - Email
      - Password
      properties:
        Name:
          type: string
          example: Dusan Stoiljkovic
        Email:
          type: string
          format: email
          example: dusan@gmail.com
        Password:
          type: string
          format: password
          example: dusan123
    LoginRequest:
      type: object
      required:
      - Email
      - Password
      properties:
        Email:
          type: string
          format: email
          example: dusan@gmail.com
        Password:
          type: string
          format: password
          example: dusan123
    LoginResponse:
      type: object
      properties:
        jwt:
          type: string
          example: your.jwt.token
    User:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: Dusan Stoiljkovic
        email:
          type: string
          format: email
          example: dusan@gmail.com
        created_at:
          type: string
          format: date-time
    MovieCreateRequest:
      type: object
      required:
      - title
      - description
      - year
      - image_url
      - duration
      - genre_ids
      properties:
        title:
          type: string
          example: American Gangster
        description:
          type: string
          example: A thief who steals corporate secrets through dream-sharing technology.
        year:
          type: integer
          example: 2002
        image_url:
          type: string
          format: uri
          example: https://example.com/inception.jpg
        duration:
          type: integer
          example: 180
        genre_ids:
          type: array
          items:
            type: integer
          example:
          - 1
          - 2
          - 6
    MovieUpdateRequest:
      type: object
      required:
      - title
      - description
      - year
      - image_url
      - duration
      - genre_ids
      properties:
        title:
          type: string
          example: American Gangster
        description:
          type: string
          example: A thief who steals corporate secrets through dream-sharing technology.
        year:
          type: integer
          example: 2002
        image_url:
          type: string
          format: uri
          example: https://example.com/inception.jpg
        duration:
          type: integer
          example: 200
        rating:
          type: number
          format: float
          example: 7.0
        genre_ids:
          type: array
          items:
            type: integer
          example:
          - 1
          - 2
    Movie:
      type: object
      properties:
        id:
          type: integer
          example: 1
        title:
          type: string
          example: American Gangster
        description:
          type: string
        year:
          type: integer
          example: 2002
        image_url:
          type: string
          format: uri
        duration:
          type: integer
          example: 180
        rating:
          type: number
          format: float
          example: 7.0
        genres:
          type: array
          items:
            $ref: '#/components/schemas/Genre'
    GenreRequest:
      type: object
      required:
      - name
      properties:
        name:
          type: string
          example: romance
    Genre:
      type: object
      properties:
        id:
          type: integer
          example: 1
        name:
          type: string
          example: romance
    MovieGenreRelation:
      type: object
      properties:
        movie_id:
          type: integer
          example: 1
        genre_id:
          type: integer
          example: 3
    HallRequest:
      type: object
      required:
      - name
      - location
      - capacity
      properties:
        name:
          type: string
          example: Sala 3
        location:
          type: string
          example: Paracin
        capacity:
          type: integer
          example: 100
    Hall:
      type: object
      properties:
        id:
          type: integer
          example: 4
        name:
          type: string
          example: Sala 3
        location:
          type: string
          example: Paracin
        capacity:
          type: integer
          example: 100
    ProjectionRequest:
      type: object
      required:
      - movie_id
      - hall_id
      - start_time
      - end_time
      - price
      properties:
        movie_id:
          type: integer
          example: 1
        hall_id:
          type: integer
          example: 4
        start_time:
          type: string
          format: date-time
          example: '2026-05-05T18:00:00+02:00'
        end_time:
          type: string
          format: date-time
          example: '2026-05-05T20:00:00+02:00'
        price:
          type: number
          example: 500
    Projection:
      type: object
      properties:
        id:
          type: integer
          example: 1
        movie_id:
          type: integer
          example: 1
        hall_id:
          type: integer
          example: 4
        start_time:
          type: string
          format: date-time
        end_time:
          type: string
          format: date-time
        price:
          type: number
          example: 500
    TicketCreateRequest:
      type: object
      required:
      - order_id
      - projection_id
      - seat_number
      properties:
        order_id:
          type: integer
          example: 1
        projection_id:
          type: integer
          example: 1
        seat_number:
          oneOf:
          - type: integer
          - type: string
          example: 1
    Ticket:
      type: object
      properties:
        id:
          type: integer
          example: 1
        order_id:
          type: integer
          example: 1
        projection_id:
          type: integer
          example: 1
        seat_number:
          oneOf:
          - type: integer
          - type: string
          example: 1
        status:
          type: string
          example: reserved
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: INVALID_INPUT
        error:
          type: string
          example: Invalid request body
