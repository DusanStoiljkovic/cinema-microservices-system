version: '3.8'

services:
  movie-db:
    image: mysql:8.0
    container_name: movie-db
    restart: always
    env_file:
      - ./movie-service.env
    ports:
      - "3308:3306"
    volumes:
      - movie_db_data:/var/lib/mysql

  movie-service:
    build: .
    container_name: movie-service
    ports:
      - "8082:8082"
    depends_on:
      - movie-db
    env_file:
      - ./movie-service.env

volumes:
  movie_db_data: